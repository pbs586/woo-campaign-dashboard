<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>우상호 후보 캠프 대시보드</title>
    <link rel="stylesheet" href="dashboard.css?v=30">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&display=swap" rel="stylesheet">
</head>
<body>
    <div class="dashboard-wrapper">
        <header class="header">
            <div class="logo">
                <h1>더불어민주당 <span>우상호</span> 후보 캠프</h1>
                <p class="subtitle">강원특별자치도 선거 트렌드 분석 대시보드</p>
            </div>
            <nav class="tabs">
                <button id="tab-main" class="tab-btn active" data-view="view-main">📊 대시보드</button>
                <button id="tab-table" class="tab-btn" data-view="view-table">📋 상세 데이터</button>
            </nav>
        </header>

        <!-- New Region Selection Bar -->
        <div class="selection-bar">
            <div class="current-focus">
                <span class="icon">📍</span> 
                <span id="active-region-name">전체</span> 
            </div>
            <div class="region-filter">
                <label for="region-select">분석 지역 변경:</label>
                <select id="region-select">
                    <!-- Options populated via JS -->
                </select>
            </div>
        </div>

        <!-- Main Dashboard View -->
        <div id="view-main" class="view-container active">
            <main class="grid-container">
                <section class="card main-chart-card">
                    <div class="card-header">
                        <h2>민주당 득표율 트렌드</h2>
                    </div>
                    <div class="canvas-container">
                        <canvas id="trendChart"></canvas>
                    </div>
                </section>

                <section class="card side-card">
                    <div class="card-header">
                        <h2>주요 선거 격차 분석</h2>
                    </div>
                    <div class="stats-container" id="gapStats">
                        <!-- Populated via JS -->
                    </div>
                </section>
                
                <section class="card bottom-card">
                     <div class="card-header">
                        <h2>양당 득표 비율</h2>
                    </div>
                    <div class="bottom-charts">
                         <div class="canvas-container mini">
                            <canvas id="pieChart7"></canvas>
                        </div>
                         <div class="canvas-container mini">
                            <canvas id="pieChart8"></canvas>
                        </div>
                         <div class="canvas-container mini">
                            <canvas id="pieChart21"></canvas>
                        </div>
                    </div>
                </section>
            </main>
        </div>

        <!-- 상세 데이터 표 뷰 -->
        <div id="view-table" class="view-container">
            <div class="view-header">
                <h2>강원특별자치도 시군별 상세 선거 데이터</h2>
                <div class="table-hint">
                    <span class="hint-icon">💡</span> <strong>지역명을 클릭</strong>하시면 해당 지역의 상세 대시보드로 이동합니다.
                </div>
            </div>
            <div class="card full-card" style="padding: 0; overflow: hidden;">
                <div class="table-wrapper">
                    <table id="dataTable">
                        <thead>
                            <tr>
                                <th data-sort="name">지역명 ↕</th>
                                <th data-sort="elec7.gap">7회 격차 ↕</th>
                                <th data-sort="elec8.gap">8회 격차 ↕</th>
                                <th data-sort="pres21.gap">21대 격차 ↕</th>
                                <th data-sort="avg_index">3개 평균 ↕</th>
                                <th data-sort="priority">평균대비지수 ↕</th>
                            </tr>
                        </thead>
                        <tbody>
                            <!-- Populated via JS -->
                        </tbody>
                    </table>
                </div>
            </div>
        </div>

        <footer class="footer">
            <p>© 2026 더불어민주당 우상호 강원특별자치도지사 후보 캠프 | 데이터 출처: 중앙선거관리위원회 선거통계시스템</p>
        </header>

    </div>
    <script src="dashboard.js?v=30"></script>
</body>
</html>
